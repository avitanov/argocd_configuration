namespace:
  create: true
  name: emt-prod
secrets:
  existingSecret: emt-app-secrets
  create: false
  externalSecret:
    enabled: true
    name: emt-app-secrets
    refreshInterval: 1h
    secretStoreRef:
      name: aws-secrets-manager
      kind: ClusterSecretStore
    creationPolicy: Owner
    data:
      - secretKey: SPRING_DATASOURCE_URL
        remoteRef:
          key: emt/prod/app
          property: SPRING_DATASOURCE_URL
      - secretKey: SPRING_DATASOURCE_USERNAME
        remoteRef:
          key: emt/prod/app
          property: SPRING_DATASOURCE_USERNAME
      - secretKey: SPRING_DATASOURCE_PASSWORD
        remoteRef:
          key: emt/prod/app
          property: SPRING_DATASOURCE_PASSWORD
      - secretKey: GEMINI_API_KEY
        remoteRef:
          key: emt/prod/app
          property: GEMINI_API_KEY
      - secretKey: password
        remoteRef:
          key: emt/prod/app
          property: SPRING_DATASOURCE_PASSWORD
      - secretKey: postgres-password
        remoteRef:
          key: emt/prod/app
          property: POSTGRES_PASSWORD
      - secretKey: repmgr-password
        remoteRef:
          key: emt/prod/app
          property: REPMGR_PASSWORD
      - secretKey: admin-password
        remoteRef:
          key: emt/prod/app
          property: PGPOOL_ADMIN_PASSWORD
      - secretKey: sr-check-password
        remoteRef:
          key: emt/prod/app
          property: SR_CHECK_PASSWORD
frontend:
  replicaCount: 2
  image:
    repository: 004619892251.dkr.ecr.eu-central-1.amazonaws.com/emt-frontend
    tag: 12d453405301059e2f71a44448ba2e9a50309180
  resources:
    requests:
      cpu: 150m
      memory: 192Mi
    limits:
      cpu: 300m
      memory: 384Mi
backend:
  replicaCount: 2
  image:
    repository: 004619892251.dkr.ecr.eu-central-1.amazonaws.com/emt-backend
    tag: 4a6c23f0eea7b5fb2321d11004ee58b049ffbbbc
  config:
    APP_CORS_ALLOWED_ORIGINS: "*"
  resources:
    requests:
      cpu: 250m
      memory: 384Mi
    limits:
      cpu: 750m
      memory: 768Mi
databaseSeeder:
  enabled: true
  seedVersion: v1
  truncateBeforeLoad: false
  image:
    repository: 004619892251.dkr.ecr.eu-central-1.amazonaws.com/emt-db-seeder
    tag: 3750a9454e2365c44d11efd076f8d62268e330fe
    pullPolicy: IfNotPresent
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
  host: ""
postgresql-ha:
  global:
    security:
      allowInsecureImages: true
    defaultStorageClass: gp3
    postgresql:
      database: products
      username: products
      existingSecret: emt-app-secrets
      repmgrUsername: repmgr
      repmgrPassword: ""
    pgpool:
      existingSecret: emt-app-secrets
      adminUsername: admin
      adminPassword: ""
      srCheckUsername: repmgr
      srCheckPassword: ""
  persistence:
    size: 20Gi
  postgresql:
    image:
      registry: 004619892251.dkr.ecr.eu-central-1.amazonaws.com
      repository: emt-postgresql-repmgr
      tag: 17.6.0-debian-12-r2
    replicaCount: 3
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi
  pgpool:
    image:
      registry: 004619892251.dkr.ecr.eu-central-1.amazonaws.com
      repository: emt-pgpool
      tag: 4.6.3-debian-12-r0
    replicaCount: 2
    resources:
      requests:
        cpu: 150m
        memory: 192Mi
      limits:
        cpu: 300m
        memory: 384Mi
