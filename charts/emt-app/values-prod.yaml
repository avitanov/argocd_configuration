namespace:
  create: true
  name: emt-prod
secrets:
  existingSecret: emt-app-secrets
  create: false
  externalSecret:
    enabled: true
    name: emt-app-secrets
    refreshInterval: 1h
    secretStoreRef:
      name: aws-secrets-manager
      kind: ClusterSecretStore
    creationPolicy: Owner
    data:
      - secretKey: SPRING_DATASOURCE_URL
        remoteRef:
          key: emt/prod/app
          property: SPRING_DATASOURCE_URL
      - secretKey: SPRING_DATASOURCE_USERNAME
        remoteRef:
          key: emt/prod/app
          property: SPRING_DATASOURCE_USERNAME
      - secretKey: SPRING_DATASOURCE_PASSWORD
        remoteRef:
          key: emt/prod/app
          property: SPRING_DATASOURCE_PASSWORD
      - secretKey: GEMINI_API_KEY
        remoteRef:
          key: emt/prod/app
          property: GEMINI_API_KEY
      - secretKey: password
        remoteRef:
          key: emt/prod/database
          property: password
      - secretKey: postgres-password
        remoteRef:
          key: emt/prod/database
          property: postgres-password
      - secretKey: repmgr-password
        remoteRef:
          key: emt/prod/database
          property: repmgr-password
      - secretKey: admin-password
        remoteRef:
          key: emt/prod/database
          property: admin-password
      - secretKey: sr-check-password
        remoteRef:
          key: emt/prod/database
          property: sr-check-password
frontend:
  replicaCount: 2
  image:
    repository: 004619892251.dkr.ecr.eu-central-1.amazonaws.com/emt-frontend
    tag: 775ffd65d98d68f809b0bf188544611ffb378da0
  resources:
    requests:
      cpu: 150m
      memory: 192Mi
    limits:
      cpu: 300m
      memory: 384Mi
backend:
  replicaCount: 2
  image:
    repository: 004619892251.dkr.ecr.eu-central-1.amazonaws.com/emt-backend
    tag: 12d453405301059e2f71a44448ba2e9a50309180
  config:
    APP_CORS_ALLOWED_ORIGINS: https://emt.example.com
  resources:
    requests:
      cpu: 250m
      memory: 384Mi
    limits:
      cpu: 750m
      memory: 768Mi
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
  host: emt.example.com
postgresql-ha:
  global:
    defaultStorageClass: gp3
    postgresql:
      database: products
      username: products
      existingSecret: emt-app-secrets
      repmgrUsername: repmgr
      repmgrPassword: ""
    pgpool:
      existingSecret: emt-app-secrets
      adminUsername: admin
      adminPassword: ""
      srCheckUsername: repmgr
      srCheckPassword: ""
  postgresql:
    replicaCount: 3
    persistence:
      size: 20Gi
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi
  pgpool:
    replicaCount: 2
    resources:
      requests:
        cpu: 150m
        memory: 192Mi
      limits:
        cpu: 300m
        memory: 384Mi
