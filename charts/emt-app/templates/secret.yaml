{{- if and .Values.backend.secret.create (not .Values.backend.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "emt-app.backendSecretName" . }}
  namespace: {{ include "emt-app.namespace" . }}
  labels:
    {{- include "emt-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  SPRING_DATASOURCE_URL: {{ .Values.backend.secret.SPRING_DATASOURCE_URL | quote }}
  SPRING_DATASOURCE_USERNAME: {{ .Values.backend.secret.SPRING_DATASOURCE_USERNAME | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.backend.secret.SPRING_DATASOURCE_PASSWORD | quote }}
  GEMINI_API_KEY: {{ .Values.backend.secret.GEMINI_API_KEY | quote }}
{{- end }}
