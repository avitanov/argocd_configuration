apiVersion: v1
kind: Service
metadata:
  name: {{ include "emt-app.frontendServiceName" . }}
  namespace: {{ include "emt-app.namespace" . }}
  labels:
    {{- include "emt-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "emt-app.componentLabels" (dict "root" . "component" "frontend") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
