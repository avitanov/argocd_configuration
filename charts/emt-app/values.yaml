namespace:
  create: true
  name: emt-prod
nameOverride: ""
fullnameOverride: ""
imagePullSecrets: []
secrets:
  existingSecret: emt-app-secrets
  create: false
  values: {}
  externalSecret:
    enabled: false
    name: emt-app-secrets
    refreshInterval: 1h
    secretStoreRef:
      name: aws-secrets-manager
      kind: ClusterSecretStore
    creationPolicy: Owner
    data: []
frontend:
  replicaCount: 1
  image:
    repository: 004619892251.dkr.ecr.eu-central-1.amazonaws.com/emt-frontend
    tag: 775ffd65d98d68f809b0bf188544611ffb378da0
    pullPolicy: IfNotPresent
  containerPort: 8080
  service:
    type: ClusterIP
    port: 80
  config:
    FRONTEND_CONTAINER_PORT: "8080"
    VITE_API_BASE_URL: /api
    BACKEND_INTERNAL_URL: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 5
backend:
  replicaCount: 1
  image:
    repository: 004619892251.dkr.ecr.eu-central-1.amazonaws.com/emt-backend
    tag: 775ffd65d98d68f809b0bf188544611ffb378da0
    pullPolicy: IfNotPresent
  containerPort: 9091
  service:
    type: ClusterIP
    port: 9091
  config:
    SERVER_PORT: "9091"
    SPRING_APPLICATION_NAME: EMT Advanced
    SPRING_JPA_HIBERNATE_DDL_AUTO: none
    SPRING_JPA_HIBERNATE_SHOW_SQL: "false"
    SPRING_JPA_SHOW_SQL: "false"
    SPRING_JPA_FORMAT_SQL: "false"
    APP_CORS_ALLOWED_ORIGINS: https://app.example.com
    APP_CORS_ALLOWED_METHODS: GET,POST,PUT,PATCH,DELETE,OPTIONS
    APP_CORS_ALLOWED_HEADERS: "*"
    SIMILAR_PRODUCTS_PRICE_WINDOW: "3000"
    GEMINI_MODEL: gemini-2.0-flash-001
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
  readinessProbe:
    httpGet:
      path: /api/products/frizideri
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  livenessProbe:
    httpGet:
      path: /api/products/frizideri
      port: http
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: emt.example.com
  tls: []
  frontend:
    path: /
    pathType: Prefix
  backend:
    path: /api
    pathType: Prefix
postgresql-ha:
  enabled: true
  fullnameOverride: postgresql-ha
  global:
    defaultStorageClass: ""
    postgresql:
      database: products
      username: products
      existingSecret: emt-app-secrets
      repmgrUsername: repmgr
      repmgrPassword: ""
    pgpool:
      existingSecret: emt-app-secrets
      adminUsername: admin
      adminPassword: ""
      srCheckUsername: repmgr
      srCheckPassword: ""
  postgresql:
    replicaCount: 2
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      enabled: true
      size: 8Gi
  pgpool:
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
