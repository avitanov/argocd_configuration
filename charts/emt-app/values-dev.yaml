namespace:
  create: true
  name: emt-dev

secrets:
  existingSecret: emt-app-secrets
  create: false
  externalSecret:
    enabled: false

frontend:
  image:
    repository: emt-frontend
    tag: dev
    pullPolicy: IfNotPresent
  config:
    VITE_API_BASE_URL: /api
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 150m
      memory: 192Mi

backend:
  image:
    repository: emt-backend
    tag: dev
    pullPolicy: IfNotPresent
  config:
    APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://emt.localhost:8080
  resources:
    requests:
      cpu: 100m
      memory: 160Mi
    limits:
      cpu: 250m
      memory: 320Mi

ingress:
  enabled: true
  className: traefik
  annotations: {}
  host: emt.localhost

postgresql-ha:
  global:
    postgresql:
      database: products
      username: products
      existingSecret: emt-app-secrets
      repmgrUsername: repmgr
      repmgrPassword: ""
    pgpool:
      existingSecret: emt-app-secrets
      adminUsername: admin
      adminPassword: ""
      srCheckUsername: repmgr
      srCheckPassword: ""
  postgresql:
    replicaCount: 2
    persistence:
      size: 4Gi
    resources:
      requests:
        cpu: 100m
        memory: 192Mi
      limits:
        cpu: 250m
        memory: 384Mi
  pgpool:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        cpu: 150m
        memory: 192Mi
