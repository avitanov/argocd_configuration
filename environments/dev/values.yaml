namespace:
  create: true
  name: emt-dev

frontend:
  image:
    repository: aws-account-id.dkr.ecr.aws-region.amazonaws.com/emt-frontend
    tag: dev
  config:
    VITE_API_BASE_URL: /api
  service:
    type: ClusterIP

backend:
  image:
    repository: aws-account-id.dkr.ecr.aws-region.amazonaws.com/emt-backend
    tag: dev
  config:
    APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,https://dev.emt.example.com
  secret:
    create: true
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql-ha-pgpool:5432/products?useUnicode=true&characterEncoding=UTF-8&serverTimezone=CET
    SPRING_DATASOURCE_USERNAME: products
    SPRING_DATASOURCE_PASSWORD: change-me
    GEMINI_API_KEY: ""

ingress:
  enabled: false
  host: dev.emt.example.com

postgresql-ha:
  enabled: true
  global:
    postgresql:
      database: products
      username: products
      password: change-me
      repmgrUsername: repmgr
      repmgrPassword: change-me-repmgr
  postgresql:
    replicaCount: 2
    persistence:
      size: 4Gi
  pgpool:
    replicaCount: 1
